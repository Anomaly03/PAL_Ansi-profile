# ─────────────────────────────────────────────────────────────────
# Ansible Inventory — inventory.ini
# ─────────────────────────────────────────────────────────────────
# To deploy to THIS local machine, use the "localhost" entry below.
# To deploy to a REMOTE server, replace the IP and update SSH credentials.
# ─────────────────────────────────────────────────────────────────

[webservers]
# ── Option A: Deploy to this local machine ────────────────────────
localhost ansible_connection=local

# ── Option B: Deploy to a remote server (uncomment and edit) ──────
# 192.168.1.100  ansible_user=ubuntu  ansible_ssh_private_key_file=~/.ssh/id_rsa
# 10.0.0.5       ansible_user=centos  ansible_ssh_pass=yourpassword

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3
