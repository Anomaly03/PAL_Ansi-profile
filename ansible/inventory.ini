# ─────────────────────────────────────────────────────────────────
# Ansible Inventory — inventory.ini
# ─────────────────────────────────────────────────────────────────
# To deploy to THIS local machine, use the "localhost" entry below.
# To deploy to a REMOTE server, replace the IP and update SSH credentials.
# ─────────────────────────────────────────────────────────────────

[webservers]
# ── Node 1: Local machine (Load Balancer + App 1 & 2) ────────────────────────
localhost ansible_connection=local

# ── Node 2: Localhost secondary (App 3) ──────────────────────────
# For testing: run 3 containers on same machine
webserver2 ansible_connection=local

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3
