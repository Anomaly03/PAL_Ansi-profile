# ═══════════════════════════════════════════════════════════════════
#  docker-compose.yml
#  (Reference / shortcut — mirrors what the Ansible playbook does)
# ═══════════════════════════════════════════════════════════════════
#  Usage:
#    Build & start :  docker compose up --build -d
#    Stop & remove :  docker compose down
# ═══════════════════════════════════════════════════════════════════

services:
  # ── Web App Container 1 ─────────────────────────────────────────
  webprofile_1:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: webprofile_1
    restart: always
    environment:
      - CONTAINER_NAME=webprofile_1
      - PORT=8080
    ports:
      - "9001:8080"
    networks:
      - webprofile_net

  # ── Web App Container 2 ─────────────────────────────────────────
  webprofile_2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: webprofile_2
    restart: always
    environment:
      - CONTAINER_NAME=webprofile_2
      - PORT=8080
    ports:
      - "9002:8080"
    networks:
      - webprofile_net

  # ── Web App Container 3 (Reference for Ansible deployment) ────────────
  # This container is deployed via Ansible to webserver2 (remote node)
  # For local testing, uncomment and customize the host/port:
  # webprofile_3:
  #   build:
  #     context: ./app
  #     dockerfile: Dockerfile
  #   container_name: webprofile_3
  #   restart: always
  #   environment:
  #     - CONTAINER_NAME=webprofile_3
  #     - PORT=8080
  #   ports:
  #     - "9003:8080"
  #   networks:
  #     - webprofile_net

  # ── Nginx Load Balancer ─────────────────────────────────────────
  webprofile_lb:
    image: nginx:alpine
    container_name: webprofile_lb
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webprofile_1
      - webprofile_2
    networks:
      - webprofile_net

# ── Shared Network ──────────────────────────────────────────────
networks:
  webprofile_net:
    driver: bridge
