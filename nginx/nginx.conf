# ───────────────────────────────────────────────────
# nginx.conf — Load Balancer Configuration
# ───────────────────────────────────────────────────
# This Nginx acts as a reverse-proxy / load balancer
# that distributes traffic between two web containers.
# ───────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # ── Upstream pool (the two backend containers) ──
    upstream webprofile_cluster {
        # Round-robin is the default; Nginx will alternate
        # requests between the two servers automatically.
        server webprofile_1:8080;
        server webprofile_2:8080;
    }

    # ── Access log format ──
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_referer" upstream=$upstream_addr';

    # ── HTTP Server Block ──
    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log main;
        error_log  /var/log/nginx/error.log warn;

        # Health check endpoint for the load balancer itself
        location /lb-health {
            return 200 "Load balancer is healthy\n";
            add_header Content-Type text/plain;
        }

        # Proxy all traffic to the backend cluster
        location / {
            proxy_pass         http://webprofile_cluster;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
